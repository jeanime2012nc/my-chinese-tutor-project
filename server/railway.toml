[build]
builder = "nixpacks"
buildCommand = "cd .. && npm install && npx taro build --type h5 && cd server && npm install && npm run build"
watchPatterns = ["src/**", "../src/**", "../dist-web/**"]

[deploy]
startCommand = "node dist/main.js"
healthcheckPath = "/api/health"
restartPolicyType = "always"

